[global]
   workgroup = WORKGROUP
   server string = TrueNAS Print Server
   server role = standalone server
   
   # Network settings
   wins support = yes
   dns proxy = no
   
   # Printing
   load printers = yes
   printing = cups
   printcap name = cups
   
   # Security
   security = user
   map to guest = Bad User
   guest account = nobody
   
   # Performance
   socket options = TCP_NODELAY IPTOS_LOWDELAY
   
   # Logging
   log file = /var/log/samba/log.%m
   max log size = 50
   
   # Disable usershares
   usershare allow guests = yes
   usershare max shares = 0

[printers]
   comment = All Printers
   path = /var/spool/samba
   browseable = yes
   guest ok = yes
   writable = no
   printable = yes
   create mode = 0700
   print ok = yes

[print$]
   comment = Printer Drivers
   path = /var/lib/samba/printers
   browseable = yes
   guest ok = no
   read only = yes
   write list = root
